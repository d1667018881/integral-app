name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for proper git operations

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Note: gradle/actions/setup-gradle handles Gradle caching automatically

    - name: Verify keystore exists
      id: keystore
      run: |
        cd app
        if [ -f debug.keystore ]; then
          echo "✅ Using existing keystore from repository"
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "⚠️ Keystore not found, generating new one..."
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit keystore to repository (only if newly generated)
      if: steps.keystore.outputs.exists == 'false'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add app/debug.keystore
        git commit -m "Add debug keystore for consistent signing [skip ci]"
        git push origin main || true
        echo "Keystore committed to repository"

    - name: Increment version for this build
      id: version
      run: |
        BUILD_FILE="app/build.gradle.kts"
        OLD_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' "$BUILD_FILE")
        OLD_NAME=$(grep -oP 'versionName\s*=\s*"\K[0-9.]+' "$BUILD_FILE")
        
        # Calculate next version
        # versionCode 1 → versionName 1.0
        # versionCode 2 → versionName 1.1
        # versionCode 3 → versionName 1.2
        # Formula: versionName = 1.(versionCode - 1)
        NEW_CODE=$((OLD_CODE + 1))
        MINOR=$((NEW_CODE - 1))
        NEW_VERSION="1.${MINOR}"
        
        echo "Building version: $NEW_VERSION (code: $NEW_CODE, was: $OLD_NAME)"
        
        # Increment version in local files (for this build only)
        sed -i "s/versionCode = $OLD_CODE/versionCode = $NEW_CODE/" "$BUILD_FILE"
        # Escape dots to prevent sed treating them as wildcards (防止 . 被当成通配符)
        OLD_NAME_SAFE=$(echo "$OLD_NAME" | sed 's/\./\\./g')
        sed -i "s/versionName = \"$OLD_NAME_SAFE\"/versionName = \"$NEW_VERSION\"/" "$BUILD_FILE"
        
        echo "next_version_code=$NEW_CODE" >> $GITHUB_OUTPUT
        echo "next_version_name=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Build Debug APK
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'
        arguments: assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ steps.version.outputs.next_version_name }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Commit version increment to repo (after successful build)
      if: success()
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        NEW_VERSION="${{ steps.version.outputs.next_version_name }}"
        
        # The version was already incremented in the local files
        # Now commit it to the repository
        # [skip ci] prevents triggering another workflow
        git add app/build.gradle.kts
        git commit -m "Bump version to $NEW_VERSION [skip ci]"
        git push origin main || true
        echo "Version $NEW_VERSION committed to repository"
