name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Create debug keystore (only if not in repo)
      run: |
        cd app
        if [ -f debug.keystore ]; then
          echo "Using existing keystore from repository"
        else
          echo "Generating new keystore..."
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Commit keystore to repository
      if: hashFiles('app/debug.keystore') != ''
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        if [ -f app/debug.keystore ] && ! git ls-files --error-unmatch app/debug.keystore 2>/dev/null; then
          git add app/debug.keystore
          git commit -m "Add debug keystore for consistent signing" || true
          git push origin main || true
          echo "Keystore committed to repository"
        fi

    - name: Increment version for this build
      id: version
      run: |
        BUILD_FILE="app/build.gradle.kts"
        OLD_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' "$BUILD_FILE")
        OLD_NAME=$(grep -oP 'versionName\s*=\s*"\K[0-9.]+' "$BUILD_FILE")
        
        # Calculate next version
        NEW_CODE=$((OLD_CODE + 1))
        MAJOR=$((NEW_CODE / 10))
        if [ $MAJOR -eq 0 ]; then
          MAJOR=1
        fi
        MINOR=$((NEW_CODE - MAJOR * 10))
        NEW_VERSION="${MAJOR}.${MINOR}"
        
        echo "Building version: $NEW_VERSION (code: $NEW_CODE)"
        
        # Increment version in local files (for this build only)
        sed -i "s/versionCode = $OLD_CODE/versionCode = $NEW_CODE/" "$BUILD_FILE"
        sed -i "s/versionName = \"$OLD_NAME\"/versionName = \"$NEW_VERSION\"/" "$BUILD_FILE"
        
        echo "next_version_code=$NEW_CODE" >> $GITHUB_OUTPUT
        echo "next_version_name=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Build Debug APK
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: '8.2'
        arguments: 'assembleDebug'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ steps.version.outputs.next_version_name }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Commit version increment to repo (after successful build)
      if: success()
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        NEW_VERSION="${{ steps.version.outputs.next_version_name }}"
        
        # The version was already incremented in the local files
        # Now commit it to the repository
        # [skip ci] prevents triggering another workflow
        git add app/build.gradle.kts
        git commit -m "Bump version to $NEW_VERSION [skip ci]"
        git push origin main || true
        echo "Version $NEW_VERSION committed to repository"
