name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Create debug keystore (only if not in repo)
      run: |
        cd app
        if [ -f debug.keystore ]; then
          echo "Using existing keystore from repository"
        else
          echo "Generating new keystore..."
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Commit keystore to repository
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        if [ -f app/debug.keystore ] && ! git ls-files --error-unmatch app/debug.keystore 2>/dev/null; then
          git add app/debug.keystore
          git commit -m "Add debug keystore for consistent signing"
          git push origin main || true
          echo "Keystore committed to repository"
        fi

    - name: Build Debug APK
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: '8.2'
        arguments: 'assembleDebug'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
